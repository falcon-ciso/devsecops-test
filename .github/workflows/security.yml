name: Security Scan
on: push
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: gitleaks/gitleaks-action@v2
    - uses: returntocorp/semgrep-action@v1
    - uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: 'Dockerfile'
